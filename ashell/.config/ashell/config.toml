outputs = "All"
position = "Top"
layer = "Top"

enable_esc_key = true

[modules]
left = [ [ "Updates", "Workspaces" ] ]
center = [ "Tempo", "WindowTitle" ]
right = [ "SystemInfo", [ "Tray", "Privacy", "Settings" ] ]

[appearance]
font_name = "JetBrainsMono Nerd Font"
style = "Solid"
primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#a9b1d6"
workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"

[system_info]
indicators = [ "Cpu", "Memory", "Temperature", "UploadSpeed", "DownloadSpeed" ]

[updates]
check_cmd = "checkupdates; yay -Qua"
update_cmd = 'ghostty -e bash -c "yay; echo Done - Press enter to exit; read" &'
interval = 3600

[window_title]
mode = "InitialTitle"

[workspaces]
visibility_mode = "MonitorSpecific"
enable_workspace_filling = true
max_workspaces = 10
group_by_monitor = true